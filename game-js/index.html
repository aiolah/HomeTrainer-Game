<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">
    <title>Simulation Vélo - Caméra Suiveuse</title>
  </head>
  <body>
    <div id="controls">
      <label
        >Vitesse :
        <input type="range" id="speed" min="-5" max="10" step="0.1" value="0" />
      </label>
      <span id="speedValue">0</span>
      <br /><br />
      <label
        >Angle roue avant :
        <input
          type="range"
          id="steering"
          min="-45"
          max="45"
          step="1"
          value="0"
        />
        <br /><br />
        Score : <span id="scoreValue">0</span>
      </label>
      <br /><br />
      <span id="steeringValue">0</span>° rotation
    </div>
    <div id="heart-container">
      <div id="spo2-container"><span id="spo2-value"></span> %</div>
      <div id="temperature-container"><span id="temperature-value"></span> °C</div>
      <span id="bpm-container"><span id="bpm-value"></span> BPM</span>
      <svg class="heart" viewBox="0 0 32 29.6">
        <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
      </svg>
    </div>
    <canvas id="canvas"></canvas>
    <script src="app.js"></script>
  </body>
</html>
